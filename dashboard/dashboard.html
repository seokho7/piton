<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>piton — Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <div class="app">

    <header class="header">
      <div class="header-left">
        <button class="btn-icon" id="btn-back" title="Close">
          <svg width="15" height="15" viewBox="0 0 16 16" fill="currentColor">
            <path d="M7.78 12.53a.75.75 0 01-1.06 0L2.47 8.28a.75.75 0 010-1.06l4.25-4.25a.75.75 0 011.06 1.06L4.81 7h7.44a.75.75 0 010 1.5H4.81l2.97 2.97a.75.75 0 010 1.06z"/>
          </svg>
        </button>
        <span class="title">Dashboard</span>
      </div>
      <button class="btn-new" id="btn-new">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor">
          <path d="M8 2a.75.75 0 01.75.75v4.5h4.5a.75.75 0 010 1.5h-4.5v4.5a.75.75 0 01-1.5 0v-4.5h-4.5a.75.75 0 010-1.5h4.5v-4.5A.75.75 0 018 2z"/>
        </svg>
        New Script
      </button>
    </header>

    <div class="search-bar">
      <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor" class="search-icon">
        <path d="M10.68 11.74a6 6 0 01-7.922-8.982 6 6 0 018.982 7.922l3.04 3.04a.749.749 0 11-1.06 1.06l-3.04-3.04zm-5.68.26a4.5 4.5 0 100-9 4.5 4.5 0 000 9z"/>
      </svg>
      <input type="text" id="search" class="search-input" placeholder="Search scripts or sites…">
    </div>

    <main class="content" id="content"></main>

    <div class="empty" id="empty">
      <p class="empty-title">No scripts yet</p>
      <p class="empty-sub">Create your first userscript</p>
      <button class="btn-primary" id="btn-empty">Create Script</button>
    </div>

  </div>

  <div class="made-by">by <a href="https://github.com/seokho7" target="_blank">@seokho7</a></div>
  <script src="dashboard.js"></script>
</body>
</html>
